services:
  ambev.developerevaluation.webapi:
    container_name: ambev_developer_evaluation_webapi
    image: ambevdeveloperevaluationwebapi
    build:
      context: .
      dockerfile: src/Ambev.DeveloperEvaluation.WebApi/Dockerfile
    pull_policy: build
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Host=ambev.developerevaluation.database;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=ambev.developerevaluation.cache:6379,password=${REDIS_PASSWORD}
      - ConnectionStrings__RabbitMQ=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@ambev.developerevaluation.rabbitmq:5672
      - ConnectionStrings__Seq=http://ambev.developerevaluation.seq:5341
    ports:
      - "8080:8080"
    depends_on:
      - ambev.developerevaluation.database
      - ambev.developerevaluation.rabbitmq
      - ambev.developerevaluation.seq

  ambev.developerevaluation.microservices:
    container_name: ambev_developer_evaluation_microservices
    image: ambevdeveloperevaluationmicroservices
    build:
      context: .
      dockerfile: src/Adapter/Drivers/Microservices/Ambev.DeveloperEvaluation.MicroServices/Dockerfile
    pull_policy: build
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT}
      - ConnectionStrings__RabbitMQ=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@ambev.developerevaluation.rabbitmq:5672
      - ConnectionStrings__Seq=http://ambev.developerevaluation.seq:5341
    depends_on:
      - ambev.developerevaluation.rabbitmq
      - ambev.developerevaluation.seq

  ambev.developerevaluation.database:
    container_name: ambev_developer_evaluation_database_two
    image: postgres:14.22

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./src/Ambev.DeveloperEvaluation.WebApi/sql/init2.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5474:5432"
    restart: unless-stopped

  ambev.developerevaluation.cache:
    container_name: ambev_developer_evaluation_cache_two
    image: redis:7.4.1-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "5475:6379"

  ambev.developerevaluation.rabbitmq:
    container_name: ambev_developer_evaluation_rabbitmq_two
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5674:5672"
      - "15674:15672"

  ambev.developerevaluation.seq:
    container_name: ambev_developer_evaluation_seq_two
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=${SEQ_EULA}
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:5341"
      - "8088:80"

volumes:
  pgdata:
